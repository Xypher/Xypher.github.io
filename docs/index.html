<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Earthquake Monitoring - BMKG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-earth-asia"></i>
                <h1>Gempa Terkini <span>BMKG</span></h1>
            </div>
            <div class="header-info">
                <div class="update-time">
                    <i class="fas fa-clock"></i>
                    <span id="update-time">Memuat...</span>
                </div>
                <button class="refresh-btn" onclick="loadData()">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="earthquake-grid" id="earthquake-grid">
            <!-- Skeleton Loading -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>

        <!-- Error Message -->
        <div class="error-container" id="error-container">
            <i class="fas fa-exclamation-triangle"></i>
            <h2>Gagal Memuat Data</h2>
            <p>Silakan coba lagi atau periksa koneksi internet Anda</p>
            <button class="retry-btn" onclick="loadData()">Coba Lagi</button>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>Sumber data resmi: <a href="https://bmkg.go.id" target="_blank">BMKG</a></p>
            <p>© 2024 Earthquake Monitoring System</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/id.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
