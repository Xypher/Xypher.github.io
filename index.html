<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gempa Terkini - BMKG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>
                <i class="fas fa-wave-square"></i>
                Monitoring Gempa Bumi
                <div class="subtitle">Badan Meteorologi, Klimatologi, dan Geofisika</div>
            </h1>
            <div class="header-info">
                <div class="update-time">
                    <i class="fas fa-clock"></i>
                    Update: <span id="update-time">-</span>
                </div>
                <button class="refresh-btn" onclick="getGempaData()">
                    <i class="fas fa-sync"></i>
                    Refresh Data
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="grid-container" id="gempa-container">
            <!-- Skeleton Loading -->
            <div class="skeleton-loading">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
            
            <!-- Error Message -->
            <div class="error-message" id="error-message">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Gagal memuat data gempa</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <div class="source-info">
                <i class="fas fa-database"></i>
                Sumber Data: BMKG (Badan Meteorologi, Klimatologi, dan Geofisika)
            </div>
            <div class="credits">
                © 2024 Monitoring Gempa | 
                <a href="#" target="_blank">
                    <i class="fas fa-code"></i>
                    Developer Mode
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/id.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
