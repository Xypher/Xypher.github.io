<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuake | Real-Time Seismic Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f7ff;
            --secondary: #ff4d79;
            --background: #0a0f1d;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: var(--background);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 247, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
        }

        header {
            text-align: center;
            padding: 4rem 0;
            position: relative;
        }

        h1 {
            font-size: 4rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(0, 247, 255, 0.2);
            margin-bottom: 1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            position: relative;
        }

        #map {
            height: 700px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 247, 255, 0.05);
            background: #000;
        }

        .sidebar {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 2rem;
            height: 700px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .earthquake-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .earthquake-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: 0.5s;
        }

        .earthquake-card:hover::before {
            left: 100%;
        }

        .earthquake-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 247, 255, 0.1);
        }

        .magnitude {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .time {
            color: #8a8a8a;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .location {
            font-size: 1.2rem;
            margin: 0.5rem 0;
            color: var(--primary);
        }

        .legend {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.8);
            padding: 1.5rem;
            border-radius: 15px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 0.7rem 0;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 1rem;
            box-shadow: 0 0 10px currentColor;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            #map {
                height: 500px;
            }

            .sidebar {
                height: 500px;
            }

            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="glow" style="top: -200px; right: -200px;"></div>
    <div class="glow" style="bottom: -200px; left: -200px;"></div>

    <header>
        <div class="container">
            <h1>GeoQuake</h1>
            <p>Real-Time Seismic Activity Visualization</p>
        </div>
    </header>

    <div class="container">
        <div class="dashboard">
            <div id="map"></div>
            <div class="sidebar" id="earthquake-list">
                <div class="loading">Loading seismic data...</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        const config = {
            apiUrl: 'https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json',
            updateInterval: 300000, // 5 minutes
            mapCenter: [-2.5489, 118.0149],
            mapZoom: 5
        };

        // Initialize Map
        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                preferCanvas: true
            }).setView(config.mapCenter, config.mapZoom);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            L.control.zoom({ position: 'bottomright' }).addTo(map);
        }

        // Get Magnitude Color
        const getMagnitudeColor = (mag) => {
            if (mag < 5) return '#00f7ff';
            if (mag < 6) return '#ffd700';
            if (mag < 7) return '#ff8c00';
            return '#ff0000';
        };

        // Format Time
        const formatTime = (dateString) => {
            return new Date(dateString).toLocaleString('id-ID', {
                weekday: 'short',
                day: 'numeric',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        };

        // Create Earthquake Card
        const createCard = (quake) => {
            const card = document.createElement('div');
            card.className = 'earthquake-card';
            card.innerHTML = `
                <div class="magnitude">
                    <span>${quake.Magnitude} SR</span>
                </div>
                <div class="location">${quake.Wilayah}</div>
                <div class="coordinates">${quake.Coordinates}</div>
                <div class="depth">Depth: ${quake.Kedalaman}</div>
                <div class="time">${formatTime(quake.DateTime)}</div>
            `;
            return card;
        };

        // Update Map Marker
        const updateMarker = (quake) => {
            const [lat, lng] = quake.Coordinates.split(',').map(Number);
            
            if (window.currentMarker) {
                map.removeLayer(window.currentMarker);
            }

            window.currentMarker = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: 'pulse-marker',
                    html: `<div style="
                        width: 40px;
                        height: 40px;
                        background: ${getMagnitudeColor(quake.Magnitude)};
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-weight: bold;
                        border: 2px solid white;
                        box-shadow: 0 0 20px ${getMagnitudeColor(quake.Magnitude)};
                        animation: pulse 1.5s infinite;
                    ">
                        ${quake.Magnitude}
                    </div>`
                })
            }).addTo(map)
            .bindPopup(`
                <b>${quake.Wilayah}</b><br>
                Magnitude: ${quake.Magnitude} SR<br>
                Depth: ${quake.Kedalaman}<br>
                Time: ${formatTime(quake.DateTime)}
            `);

            map.panTo([lat, lng], {
                animate: true,
                duration: 1
            });
        };

        // Fetch Data
        const fetchData = async () => {
            try {
                const response = await fetch(config.apiUrl);
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                return data.Infogempa.gempa;
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to fetch data');
                return null;
            }
        };

        // Update UI
        const updateUI = async () => {
            const data = await fetchData();
            if (!data) return;

            const list = document.getElementById('earthquake-list');
            list.innerHTML = '';
            
            const card = createCard(data);
            list.appendChild(card);
            
            updateMarker(data);
            addLegend();
        };

        // Add Legend
        const addLegend = () => {
            const legend = L.control({ position: 'bottomright' });
            legend.onAdd = () => {
                const div = L.DomUtil.create('div', 'legend');
                div.innerHTML = `
                    <h4>Magnitude Scale</h4>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #00f7ff"></div>
                        <span>&lt; 5.0</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ffd700"></div>
                        <span>5.0 - 6.0</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ff8c00"></div>
                        <span>6.0 - 7.0</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ff0000"></div>
                        <span>&gt; 7.0</span>
                    </div>
                `;
                return div;
            };
            legend.addTo(map);
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            updateUI();
            setInterval(updateUI, config.updateInterval);
        });
    </script>
</body>
</html>
