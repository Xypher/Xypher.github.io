<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Gempa Terkini</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --card-bg: #f8f9fa;
            --primary: #ff4757;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a1a;
                --text-color: #ffffff;
                --card-bg: #2d2d2d;
                --primary: #ff6b6b;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        #map {
            height: 60vh;
            width: 100%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .quake-info {
            background: var(--card-bg);
            padding: 1.5rem;
            margin-top: 1rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .magnitude {
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.8; }
        }

        .quake-marker {
            animation: pulse 1.5s infinite;
        }

        .loading {
            padding: 1rem;
            text-align: center;
            color: var(--text-color);
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            #map {
                height: 50vh;
            }
            
            .quake-info {
                padding: 1rem;
                font-size: 0.9rem;
            }
            
            .magnitude {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="container">
        <div class="quake-info" id="info">
            <div class="loading">Mendeteksi gempa terkini...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Fungsi konversi koordinat BMKG ke numerik
        function parseCoordinates(coordString) {
            try {
                const cleanString = coordString.replace(/[^\d., LSBT]/g, '');
                const [latPart, lngPart] = cleanString.split(', ');
                
                const lat = parseFloat(latPart.replace(' LS', '').trim());
                const lng = parseFloat(lngPart.replace(' BT', '').trim());
                
                return [
                    latPart.includes('LS') ? -lat : lat,
                    lngPart.includes('BT') ? lng : -lng
                ];
            } catch (error) {
                console.error('Error parsing coordinates:', error);
                return [0, 0];
            }
        }

        // Inisialisasi peta
        let map = L.map('map', {
            zoomControl: false,
            fadeAnimation: true
        });

        // Layer peta
        const baseLayers = {
            "Gelap": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap'
            }),
            "Terang": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            })
        };

        // Default layer sesuai tema
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            baseLayers.Gelap.addTo(map);
        } else {
            baseLayers.Terang.addTo(map);
        }

        L.control.layers(baseLayers).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let currentMarker = null;

        // Update peta dengan animasi
        async function updateMapData() {
            try {
                const response = await fetch('https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json');
                const data = await response.json();
                const quake = data.Infogempa.gempa;
                
                // Parse koordinat
                const [lat, lng] = parseCoordinates(quake.Coordinates);
                
                // Hapus marker lama
                if (currentMarker) map.removeLayer(currentMarker);

                // Buat marker baru
                currentMarker = L.marker([lat, lng], {
                    icon: L.divIcon({
                        className: 'quake-marker',
                        html: `<div style="
                            background: ${getColor(quake.Magnitude)};
                            width: 40px;
                            height: 40px;
                            border-radius: 50%;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: white;
                            font-weight: bold;
                            border: 2px solid white;
                            box-shadow: 0 0 15px ${getColor(quake.Magnitude)};
                        ">${quake.Magnitude}</div>`
                    })
                }).addTo(map);

                // Animasi pindah ke lokasi
                map.flyTo([lat, lng], 7, {
                    animate: true,
                    duration: 1.5
                });

                // Update info
                document.getElementById('info').innerHTML = `
                    <div class="magnitude">${quake.Magnitude} SR</div>
                    <div><strong>Lokasi:</strong> ${quake.Wilayah}</div>
                    <div><strong>Kedalaman:</strong> ${quake.Kedalaman}</div>
                    <div><strong>Waktu:</strong> ${new Date(quake.DateTime).toLocaleString('id-ID')}</div>
                    <div><strong>Koordinat:</strong> ${lat.toFixed(2)}° LS, ${lng.toFixed(2)}° BT</div>
                `;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('info').innerHTML = `
                    <div style="color: var(--primary)">Gagal memuat data gempa terbaru</div>
                `;
            }
        }

        // Warna berdasarkan magnitude
        function getColor(mag) {
            return mag >= 7 ? '#ff0000' :
                   mag >= 6 ? '#ff6b6b' :
                   mag >= 5 ? '#ffd700' :
                              '#00c851';
        }

        // Auto update setiap 5 menit
        updateMapData();
        setInterval(updateMapData, 300000);

        // Deteksi perubahan tema
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (e.matches) {
                baseLayers.Gelap.addTo(map);
                baseLayers.Terang.remove();
            } else {
                baseLayers.Terang.addTo(map);
                baseLayers.Gelap.remove();
            }
        });
    </script>
</body>
</html>
