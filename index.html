<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeismoVision | Advanced Earthquake Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7b61ff;
            --secondary: #00ff88;
            --accent: #ff6b6b;
            --background: #0a0a16;
            --card-bg: linear-gradient(145deg, #1a1a2e, #0a0a16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Chakra Petch', sans-serif;
        }

        body {
            background: var(--background);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 4rem 0;
            position: relative;
        }

        h1 {
            font-size: 4.5rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(123, 97, 255, 0.3);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 2.5rem;
            margin-top: 2rem;
        }

        #map {
            height: 800px;
            border-radius: 25px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 60px rgba(123, 97, 255, 0.1);
            background: #000;
        }

        .control-panel {
            display: grid;
            gap: 1.5rem;
            height: 800px;
        }

        .data-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .data-card:hover {
            transform: translateY(-5px);
        }

        .earthquake-list {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .quake-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }

        .magnitude-badge {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .depth-indicator {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 0.5rem 0;
            position: relative;
        }

        .depth-progress {
            height: 100%;
            background: var(--secondary);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .live-pulse {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            #map {
                height: 600px;
            }

            .control-panel {
                height: auto;
            }

            h1 {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <header>
        <div class="container">
            <h1>SeismoVision</h1>
            <p>Advanced Seismic Activity Monitoring System</p>
        </div>
    </header>

    <div class="container">
        <div class="dashboard">
            <div id="map"></div>
            
            <div class="control-panel">
                <div class="data-card">
                    <h2>Real-time Metrics</h2>
                    <div id="live-metrics" class="loading">Initializing sensors...</div>
                </div>
                
                <div class="data-card earthquake-list" id="quake-list">
                    <h2>Recent Activity</h2>
                    <div class="loading">Scanning seismic waves...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // Particle Background
        particlesJS('particles', {
            particles: {
                number: { value: 80 },
                color: { value: '#7b61ff' },
                shape: { type: 'circle' },
                opacity: { value: 0.5 },
                size: { value: 3 },
                move: {
                    enable: true,
                    speed: 1,
                    direction: 'none',
                    random: true,
                    straight: false,
                    out_mode: 'out'
                }
            },
            interactivity: {
                events: { onhover: { enable: true, mode: 'repulse' } }
            }
        });

        // Map Configuration
        const mapConfig = {
            center: [-2.5489, 118.0149],
            zoom: 5,
            style: 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
            overlays: {
                heatmap: true,
                tectonic: true
            }
        };

        // Initialize Advanced Map
        const map = L.map('map', {
            zoomControl: false,
            preferCanvas: true,
            inertia: true
        }).setView(mapConfig.center, mapConfig.zoom);

        L.tileLayer(mapConfig.style, {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Seismic Data Layer
        const seismicLayer = L.layerGroup().addTo(map);

        // Depth Visualization
        function createDepthIndicator(depth) {
            const maxDepth = 300; // 300 km
            const percentage = Math.min((depth / maxDepth) * 100, 100);
            return `<div class="depth-indicator">
                <div class="depth-progress" style="width: ${percentage}%"></div>
            </div>`;
        }

        // Create Quake Item
        function createQuakeItem(quake) {
            const item = document.createElement('div');
            item.className = 'quake-item';
            item.innerHTML = `
                <div class="magnitude-badge">${quake.Magnitude} SR</div>
                <div class="location">${quake.Wilayah}</div>
                ${createDepthIndicator(parseInt(quake.Kedalaman))}
                <div class="time">
                    <span class="live-pulse"></span>
                    ${new Date(quake.DateTime).toLocaleTimeString('id-ID')}
                </div>
            `;
            return item;
        }

        // 3D Map Effect
        function add3DEffect(lat, lng, magnitude) {
            const intensity = magnitude * 10000;
            L.circle([lat, lng], {
                color: '#7b61ff',
                fillColor: '#7b61ff',
                radius: intensity,
                opacity: 0.2,
                fillOpacity: 0.1
            }).addTo(seismicLayer);
        }

        // Update Display
        async function updateDisplay() {
            try {
                const response = await fetch('https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json');
                const data = await response.json();
                const quake = data.Infogempa.gempa;

                // Update Map
                const [lat, lng] = quake.Coordinates.split(',').map(Number);
                seismicLayer.clearLayers();
                add3DEffect(lat, lng, quake.Magnitude);

                // Update List
                const list = document.getElementById('quake-list');
                const newItem = createQuakeItem(quake);
                list.insertBefore(newItem, list.firstChild);
                if (list.children.length > 8) list.lastChild.remove();

                // Update Metrics
                document.getElementById('live-metrics').innerHTML = `
                    <div class="metric">Max Magnitude: ${quake.Magnitude} SR</div>
                    <div class="metric">Avg Depth: ${quake.Kedalaman}</div>
                    <div class="metric">Last Update: ${new Date().toLocaleTimeString()}</div>
                `;

            } catch (error) {
                console.error('Seismic data error:', error);
            }
        }

        // Initialize System
        setInterval(updateDisplay, 30000);
        updateDisplay();

        // Advanced Controls
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.control.layers({
            'Dark Map': L.tileLayer(mapConfig.style),
            'Satellite': L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}')
        }).addTo(map);
    </script>
</body>
</html>
