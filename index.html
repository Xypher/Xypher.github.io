<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gempa Terkini - Monitoring Real-time</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #2563eb;
            --background: #ffffff;
            --text: #1e293b;
            --card-bg: #f8fafc;
            --border: #e2e8f0;
            --map-tile-filter: none;
        }

        [data-theme="dark"] {
            --primary: #60a5fa;
            --background: #0f172a;
            --text: #f8fafc;
            --card-bg: #1e293b;
            --border: #334155;
            --map-tile-filter: invert(1) hue-rotate(180deg) brightness(0.8) contrast(1.2);
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui;
            background: var(--background);
            color: var(--text);
            transition: all 0.3s ease;
        }

        .header {
            background: linear-gradient(to right, var(--primary), #4f46e5);
            color: white;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #map {
            height: 55vh;
            width: 100%;
            border-bottom: 1px solid var(--border);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .earthquake-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        }

        .earthquake-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            transition: transform 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .earthquake-card:hover {
            transform: translateY(-3px);
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .last-updated {
            text-align: right;
            font-size: 0.875rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }

        .magnitude-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 600;
            background: var(--primary);
            color: white;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .leaflet-tile {
            filter: var(--map-tile-filter);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1> Monitoring Gempa Indonesia</h1>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span class="theme-icon"></span> 
                <span class="theme-text">Tema</span>
            </button>
        </div>
    </div>
    
    <div id="map"></div>
    
    <div class="container">
        <div class="last-updated" id="last-updated"></div>
        <div class="earthquake-grid" id="data-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Konfigurasi Tema
        let currentTheme = localStorage.getItem('theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', currentTheme);

        // Fungsi Toggle Tema
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateMapTiles();
        }

        // Inisialisasi Peta
        let map;
        let markers = [];
        function initMap() {
            map = L.map('map').setView([-2.5489, 118.0149], 5);
            updateMapTiles();
        }

        // Update Tile Peta berdasarkan Tema
        function updateMapTiles() {
            const tileUrl = currentTheme === 'dark' 
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
            
            if (map) {
                map.eachLayer(layer => layer.remove());
                L.tileLayer(tileUrl, {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
            }
        }

        // Fetch Data dengan CORS Proxy
        async function fetchData() {
            showLoading();
            try {
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const targetUrl = 'https://data.bmkg.go.id/DataMKG/TEWS/gempaterkini.json';
                
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                const data = await response.json();
                
                processData(data.Infogempa.gempa);
                updateLastUpdated();
            } catch (error) {
                console.error('Error:', error);
                showError();
            } finally {
                hideLoading();
            }
        }

        // Proses Data Gempa
        function processData(gempas) {
            // Clear existing data
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];
            document.getElementById('data-container').innerHTML = '';

            gempas.forEach(gempa => {
                const [lon, lat] = gempa.Coordinates.split(', ').map(Number);
                const magnitude = parseFloat(gempa.Magnitude);
                
                // Tambah Marker
                const marker = L.circleMarker([lat, lon], {
                    radius: Math.min(magnitude * 3, 30),
                    color: getColor(magnitude),
                    fillOpacity: 0.8
                }).bindPopup(`
                    <b>${gempa.Wilayah}</b><br>
                    <span> ${gempa.Tanggal} ${gempa.Jam}</span><br>
                    <span> Magnitudo: M${magnitude}</span><br>
                    <span> Kedalaman: ${gempa.Kedalaman}</span>
                `).addTo(map);
                markers.push(marker);

                // Tambah Card
                const card = document.createElement('div');
                card.className = 'earthquake-card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center">
                        <h3 style="margin: 0">${gempa.Wilayah}</h3>
                        <span class="magnitude-badge">M${magnitude}</span>
                    </div>
                    <p style="margin: 0.5rem 0">
                        <span> ${gempa.Tanggal}</span><br>
                        <span> ${gempa.Jam}</span>
                    </p>
                    <p style="margin: 0">
                        <span> ${gempa.Kedalaman}</span><br>
                        <span> ${gempa.Lintang} ${gempa.Bujur}</span>
                    </p>
                    ${gempa.Dirasakan ? `<p style="margin-top: 0.5rem"> Dirasakan: ${gempa.Dirasakan}</p>` : ''}
                `;
                document.getElementById('data-container').appendChild(card);
            });
        }

        // Fungsi Bantuan
        function getColor(magnitude) {
            return magnitude > 6 ? '#ef4444' :
                   magnitude > 5 ? '#f97316' :
                   magnitude > 4 ? '#eab308' :
                   magnitude > 3 ? '#84cc16' :
                   '#22c55e';
        }

        function showLoading() {
            const loader = document.createElement('div');
            loader.className = 'loading-overlay';
            loader.id = 'loading';
            loader.innerHTML = ' Memuat data terbaru...';
            document.body.appendChild(loader);
        }

        function hideLoading() {
            const loader = document.getElementById('loading');
            if (loader) loader.remove();
        }

        function showError() {
            const container = document.getElementById('data-container');
            container.innerHTML = `
                <div class="earthquake-card" style="grid-column: 1 / -1">
                    <h3 style="color: #ef4444"> Gagal memuat data</h3>
                    <p>Silakan coba lagi beberapa saat</p>
                </div>
            `;
        }

        function updateLastUpdated() {
            const now = new Date().toLocaleString('id-ID', {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('last-updated').textContent = `Terakhir diperbarui: ${now}`;
        }

        // Inisialisasi
        initMap();
        fetchData();
        setInterval(fetchData, 5 * 60 * 1000); // Update setiap 5 menit

        // Deteksi perubahan tema sistem
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            currentTheme = e.matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateMapTiles();
        });
    </script>
</body>
</html>
