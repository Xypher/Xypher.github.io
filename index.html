<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthquake Monitor | Real-Time</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            margin-top: 2rem;
        }

        #map {
            height: 600px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            background: #1a1a1a;
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 1.5rem;
            height: 600px;
            overflow-y: auto;
        }

        header {
            text-align: center;
            padding: 2rem 0;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #00ff87, #60efff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .earthquake-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .earthquake-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
        }

        .magnitude {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ff6b6b;
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            background: rgba(255, 107, 107, 0.1);
        }

        .time {
            color: #888;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .location {
            margin: 0.5rem 0;
            color: #60efff;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }

        .legend {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 1rem;
            border-radius: 8px;
            z-index: 1000;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 0.5rem 0;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 0.75rem;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            #map {
                height: 400px;
            }

            .sidebar {
                height: auto;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Earthquake Tracker</h1>
            <p>Real-time Monitoring System</p>
        </div>
    </header>

    <div class="container">
        <div class="dashboard">
            <div id="map"></div>
            <div class="sidebar" id="earthquake-list">
                <!-- Data gempa akan dimuat di sini -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // Inisialisasi peta
        const map = L.map('map').setView([-2.5489, 118.0149], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Marker untuk gempa terbaru
        let latestMarker = null;

        // Warna berdasarkan magnitude
        const getMagnitudeColor = (mag) => {
            if (mag < 5) return '#00ff87';
            if (mag < 6) return '#ffd700';
            if (mag < 7) return '#ff8c00';
            return '#ff0000';
        }

        // Format waktu
        const formatTime = (dateString) => {
            const options = {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        }

        // Ambil data gempa
        const fetchEarthquakeData = async () => {
            try {
                const response = await fetch('https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json');
                const data = await response.json();
                return data.Infogempa.gempa;
            } catch (error) {
                console.error('Error:', error);
                return null;
            }
        }

        // Update UI
        const updateUI = (quake) => {
            const list = document.getElementById('earthquake-list');
            
            // Update peta
            const [lat, lon] = quake.Coordinates.split(',').map(Number);
            if (latestMarker) map.removeLayer(latestMarker);
            
            latestMarker = L.marker([lat, lon], {
                icon: L.divIcon({
                    className: 'earthquake-marker',
                    html: `<div style="background: ${getMagnitudeColor(quake.Magnitude)};
                           width: 32px;
                           height: 32px;
                           border-radius: 50%;
                           display: flex;
                           align-items: center;
                           justify-content: center;
                           color: white;
                           font-weight: bold;
                           border: 2px solid white;
                           transform: translate(-50%, -50%)">
                           ${quake.Magnitude}
                         </div>`
                })
            }).addTo(map)
            .bindPopup(`
                <b>${quake.Wilayah}</b><br>
                Magnitude: ${quake.Magnitude} SR<br>
                Kedalaman: ${quake.Kedalaman}<br>
                Waktu: ${formatTime(quake.DateTime)}
            `);

            // Update list
            const card = document.createElement('div');
            card.className = 'earthquake-card';
            card.innerHTML = `
                <div class="magnitude">${quake.Magnitude} SR</div>
                <div class="location">📍 ${quake.Wilayah}</div>
                <div class="coordinates">🌐 ${quake.Coordinates}</div>
                <div class="depth">⏬ ${quake.Kedalaman}</div>
                <div class="time">🕒 ${formatTime(quake.DateTime)}</div>
            `;

            // Scroll ke item terbaru
            list.insertBefore(card, list.firstChild);
            if (list.children.length > 10) list.lastChild.remove();
            
            // Animasi scroll
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Update data setiap 5 menit
        const updateData = async () => {
            const data = await fetchEarthquakeData();
            if (data) updateUI(data);
        }

        // Inisialisasi
        updateData();
        setInterval(updateData, 300000);

        // Tambahkan legend
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = () => {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>Magnitude Legend</h4>
                <div class="legend-item">
                    <div class="legend-color" style="background: #00ff87"></div>
                    <span>&lt; 5 SR</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffd700"></div>
                    <span>5 - 6 SR</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff8c00"></div>
                    <span>6 - 7 SR</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff0000"></div>
                    <span>&gt; 7 SR</span>
                </div>
            `;
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
