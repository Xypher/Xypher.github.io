<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthquake Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --card: #f8f9fa;
            --primary: #ff4757;
            --map-tile-filter: none;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --text: #ffffff;
                --card: #2d2d2d;
                --primary: #ff6b6b;
                --map-tile-filter: brightness(0.8) invert(1) contrast(1.2);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        #map {
            height: 60vh;
            width: 100%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .quake-card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .magnitude {
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .leaflet-tile {
            filter: var(--map-tile-filter);
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--card);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        @keyframes pulse {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); }
            100% { transform: scale(0.9); }
        }

        .quake-marker {
            animation: pulse 1.5s infinite;
        }

        .loading {
            padding: 2rem;
            text-align: center;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            #map {
                height: 50vh;
            }
            
            .quake-card {
                padding: 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">Toggle Theme</button>
    <div id="map"></div>
    
    <div class="container">
        <div class="quake-card" id="quakeInfo">
            <div class="loading">Mendeteksi gempa terkini...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Konfigurasi
        const config = {
            apiUrl: 'https://corsproxy.io/?https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json',
            mapCenter: [-2.5489, 118.0149],
            mapZoom: 5
        };

        // Inisialisasi Peta
        let map = L.map('map').setView(config.mapCenter, config.mapZoom);
        let currentMarker = null;

        // Layer Peta
        const baseLayers = {
            Street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }),
            Satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
        };

        // Update Tema
        function updateMapTheme() {
            const isDark = document.documentElement.style.getPropertyValue('--bg') === '#1a1a1a';
            map.eachLayer(layer => layer.remove());
            
            if (isDark) {
                baseLayers.Street.addTo(map);
            } else {
                baseLayers.Satellite.addTo(map);
            }
        }

        // Toggle Tema Manual
        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.documentElement.style.getPropertyValue('--bg') === '#1a1a1a';
            document.documentElement.style.setProperty('--bg', isDark ? '#ffffff' : '#1a1a1a');
            document.documentElement.style.setProperty('--text', isDark ? '#1a1a1a' : '#ffffff');
            document.documentElement.style.setProperty('--card', isDark ? '#f8f9fa' : '#2d2d2d');
            document.documentElement.style.setProperty('--primary', isDark ? '#ff4757' : '#ff6b6b');
            updateMapTheme();
        });

        // Fetch Data Gempa
        async function getQuakeData() {
            try {
                const response = await fetch(config.apiUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error('Fetch error:', error);
                showError('Gagal memuat data. Coba refresh halaman');
                return null;
            }
        }

        // Update Peta dan Info
        async function updateQuakeInfo() {
            const data = await getQuakeData();
            if (!data || !data.features.length) return;

            const latestQuake = data.features[0].properties;
            const [lng, lat] = data.features[0].geometry.coordinates;

            // Update Marker
            if (currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker([lat, lng], {
                icon: L.divIcon({
                    className: 'quake-marker',
                    html: `<div style="
                        background: ${getColor(latestQuake.mag)};
                        width: 40px;
                        height: 40px;
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-weight: bold;
                        border: 2px solid white;
                        box-shadow: 0 0 15px ${getColor(latestQuake.mag)};
                    ">${latestQuake.mag.toFixed(1)}</div>`
                })
            }).addTo(map).bindPopup(latestQuake.title);

            // Update View
            map.flyTo([lat, lng], 6, { duration: 1.5 });

            // Update Info
            document.getElementById('quakeInfo').innerHTML = `
                <div class="magnitude">${latestQuake.mag.toFixed(1)} M</div>
                <div><strong>Lokasi:</strong> ${latestQuake.place}</div>
                <div><strong>Kedalaman:</strong> ${(latestQuake.depth).toFixed(1)} km</div>
                <div><strong>Waktu:</strong> ${new Date(latestQuake.time).toLocaleString('id-ID')}</div>
                <div><strong>Koordinat:</strong> ${lat.toFixed(2)}° LU, ${lng.toFixed(2)}° BT</div>
            `;
        }

        // Warna Berdasarkan Magnitude
        function getColor(mag) {
            return mag >= 7 ? '#ff0000' :
                   mag >= 6 ? '#ff6b6b' :
                   mag >= 5 ? '#ffd700' :
                               '#00c851';
        }

        // Error Handling
        function showError(message) {
            document.getElementById('quakeInfo').innerHTML = `
                <div style="color: var(--primary)">⚠️ ${message}</div>
            `;
        }

        // Inisialisasi
        updateMapTheme();
        updateQuakeInfo();
        setInterval(updateQuakeInfo, 300000);
    </script>
</body>
</html>
