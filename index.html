<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Gempa BMKG Terkini</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-earth-asia"></i> Info Gempa Terkini</h1>
            <div class="last-update">
                Update terakhir: <span id="update-time">-</span>
                <button onclick="getGempaData()"><i class="fas fa-sync"></i> Refresh</button>
            </div>
        </header>
        
        <div class="gempa-container" id="gempa-container">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                Memuat data gempa...
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/id.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
