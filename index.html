<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemantau Gempa Indonesia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --card: #f8f9fa;
            --primary: #e74c3c;
            --map-tile: brightness(1);
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --text: #ffffff;
            --card: #2d2d2d;
            --primary: #ff6b6b;
            --map-tile: invert(1) hue-rotate(180deg) brightness(0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        #map {
            height: 60vh;
            width: 100%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .info-panel {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .magnitude {
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--card);
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .leaflet-tile {
            filter: var(--map-tile);
        }

        @keyframes pulse {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); }
            100% { transform: scale(0.9); }
        }

        .quake-marker {
            animation: pulse 1.5s infinite;
        }

        .loading {
            padding: 1rem;
            text-align: center;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            #map {
                height: 50vh;
            }
            
            .info-panel {
                padding: 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle">🌓 Tema</button>
    <div id="map"></div>
    
    <div class="container">
        <div class="info-panel" id="info">
            <div class="loading">Memuat data gempa terbaru...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Konfigurasi
        const config = {
            sources: [
                {
                    name: 'BMKG',
                    url: 'https://api.allorigins.win/get?url=https://data.bmkg.go.id/DataMKG/TEWS/autogempa.json',
                    parser: parseBMKGData
                },
                {
                    name: 'USGS',
                    url: 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_day.geojson',
                    parser: parseUSGSData
                }
            ],
            updateInterval: 300000 // 5 menit
        };

        // Inisialisasi Peta
        let map = L.map('map', {
            zoomControl: false,
            fadeAnimation: true
        }).setView([-2.5489, 118.0149], 5);

        let currentMarker = null;

        // Tema Awal
        const savedTheme = localStorage.getItem('theme') || 'auto';
        setTheme(savedTheme);

        // Fungsi Tema
        function setTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else if (theme === 'light') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.toggleAttribute('data-theme', prefersDark);
            }
            localStorage.setItem('theme', theme);
        }

        // Toggle Tema
        document.getElementById('themeToggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.hasAttribute('data-theme') ? 'dark' : 'light';
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Parser Koordinat BMKG
        function parseBMKGCoordinates(coordString) {
            const [latPart, lngPart] = coordString.split(', ');
            const lat = parseFloat(latPart.replace(' LS', '').replace(' LU', ''));
            const lng = parseFloat(lngPart.replace(' BT', '').replace(' BB', ''));
            
            return [
                latPart.includes('LS') ? -lat : lat,
                lngPart.includes('BB') ? -lng : lng
            ];
        }

        // Parser Data BMKG
        function parseBMKGData(data) {
            const gempa = data?.Infogempa?.gempa;
            if (!gempa) return null;

            const [lat, lng] = parseBMKGCoordinates(gempa.Coordinates);
            
            return {
                magnitude: parseFloat(gempa.Magnitude),
                coordinates: [lat, lng],
                waktu: new Date(gempa.DateTime),
                lokasi: gempa.Wilayah,
                kedalaman: gempa.Kedalaman
            };
        }

        // Parser Data USGS
        function parseUSGSData(data) {
            const quake = data.features
                ?.find(f => f.properties.place.toLowerCase().includes('indonesia'));
            
            if (!quake) return null;

            return {
                magnitude: quake.properties.mag,
                coordinates: [quake.geometry.coordinates[1], quake.geometry.coordinates[0]],
                waktu: new Date(quake.properties.time),
                lokasi: quake.properties.place,
                kedalaman: quake.geometry.coordinates[2]
            };
        }

        // Fetch Data
        async function fetchQuakeData() {
            for (const source of config.sources) {
                try {
                    const response = await fetch(source.url);
                    const data = await response.json();
                    const parsed = source.parser(source.name === 'BMKG' ? JSON.parse(data.contents) : data);
                    if (parsed) return parsed;
                } catch (error) {
                    console.error(`Error dari ${source.name}:`, error);
                }
            }
            return null;
        }

        // Update Peta
        async function updateMap() {
            const quakeData = await fetchQuakeData();
            if (!quakeData) {
                showError('Tidak dapat memuat data gempa');
                return;
            }

            // Update Marker
            if (currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker(quakeData.coordinates, {
                icon: L.divIcon({
                    className: 'quake-marker',
                    html: `<div style="
                        background: ${getColor(quakeData.magnitude)};
                        width: 40px;
                        height: 40px;
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-weight: bold;
                        border: 2px solid white;
                        box-shadow: 0 0 15px ${getColor(quakeData.magnitude)};
                    ">${quakeData.magnitude.toFixed(1)}</div>`
                })
            }).addTo(map);

            // Update View
            map.flyTo(quakeData.coordinates, 7, { duration: 1.5 });

            // Update Info
            document.getElementById('info').innerHTML = `
                <div class="magnitude">${quakeData.magnitude.toFixed(1)} SR</div>
                <div><strong>Lokasi:</strong> ${quakeData.lokasi}</div>
                <div><strong>Kedalaman:</strong> ${quakeData.kedalaman}</div>
                <div><strong>Waktu:</strong> ${quakeData.waktu.toLocaleString('id-ID')}</div>
                <div><strong>Koordinat:</strong> 
                    ${Math.abs(quakeData.coordinates[0].toFixed(2))}° 
                    ${quakeData.coordinates[0] > 0 ? 'LU' : 'LS'}, 
                    ${Math.abs(quakeData.coordinates[1].toFixed(2))}° 
                    ${quakeData.coordinates[1] > 0 ? 'BT' : 'BB'}
                </div>
            `;
        }

        // Warna Marker
        function getColor(mag) {
            return mag >= 7 ? '#ff0000' :
                   mag >= 6 ? '#ff6b6b' :
                   mag >= 5 ? '#ffd700' :
                              '#2ecc71';
        }

        // Error Handling
        function showError(message) {
            document.getElementById('info').innerHTML = `
                <div style="color: var(--primary)">⚠️ ${message}</div>
            `;
        }

        // Inisialisasi Peta
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Auto Update
        updateMap();
        setInterval(updateMap, config.updateInterval);
    </script>
</body>
</html>
