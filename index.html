<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Gempa Indonesia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f8f9fa;
            --border-color: #dee2e6;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #f8f9fa;
            --card-bg: #2d2d2d;
            --border-color: #404040;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        #map {
            height: 60vh;
            width: 100%;
            border-bottom: 1px solid var(--border-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        #data-container {
            margin-top: 20px;
            max-height: 30vh;
            overflow-y: auto;
        }

        .earthquake-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .theme-toggle {
            background: none;
            border: 2px solid var(--text-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header container">
        <h1>Monitoring Gempa Indonesia</h1>
        <button class="theme-toggle" onclick="toggleTheme()">Terang/Gelap</button>
    </div>
    <div id="map"></div>
    <div class="container">
        <div id="data-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // Theme management
        const storedTheme = localStorage.getItem('theme');
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        
        const initialTheme = storedTheme || systemTheme;
        document.documentElement.setAttribute('data-theme', initialTheme);

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateMapTiles(newTheme);
        }

        // Map initialization
        let map;
        let earthquakeMarkers = [];

        function initMap() {
            map = L.map('map').setView([-2.5489, 118.0149], 5);
            updateMapTiles(initialTheme);
        }

        function updateMapTiles(theme) {
            if (map) {
                map.eachLayer(layer => layer.remove());
                
                const tileUrl = theme === 'dark' 
                    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                    : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
                
                L.tileLayer(tileUrl, {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
            }
        }

        // Fetch earthquake data khusus Indonesia
        async function fetchEarthquakeData() {
            try {
                const response = await fetch('https://data.bmkg.go.id/DataMKG/TEWS/gempaterkini.json');
                const data = await response.json();
                processData(data.Infogempa.gempa);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('data-container').innerHTML = 
                    '<div class="earthquake-card">Gagal memuat data gempa terbaru</div>';
            }
        }

        function processData(earthquakes) {
            // Clear previous markers
            earthquakeMarkers.forEach(marker => map.removeLayer(marker));
            earthquakeMarkers = [];

            const dataContainer = document.getElementById('data-container');
            dataContainer.innerHTML = '';

            if(!earthquakes || earthquakes.length === 0) {
                dataContainer.innerHTML = 
                    '<div class="earthquake-card">Tidak ada gempa terbaru dalam 24 jam terakhir</div>';
                return;
            }

            earthquakes.forEach(gempa => {
                const [lon, lat] = gempa.Coordinates.split(', ').map(Number);
                const magnitude = parseFloat(gempa.Magnitude);
                const waktu = `${gempa.Tanggal} ${gempa.Jam}`;
                
                // Add marker
                const marker = L.circleMarker([lat, lon], {
                    radius: magnitude * 3,
                    color: getColor(magnitude),
                    fillOpacity: 0.7
                }).bindPopup(`
                    <b>${gempa.Wilayah}</b><br>
                    Magnitudo: ${magnitude}<br>
                    Kedalaman: ${gempa.Kedalaman}<br>
                    Waktu: ${waktu}
                `).addTo(map);
                
                earthquakeMarkers.push(marker);

                // Add to data list
                const card = document.createElement('div');
                card.className = 'earthquake-card';
                card.innerHTML = `
                    <h3>M${magnitude} - ${gempa.Wilayah}</h3>
                    <p> ${gempa.Tanggal}  ${gempa.Jam}<br>
                     Kedalaman: ${gempa.Kedalaman}</p>
                    <small>Dirasakan: ${gempa.Dirasakan || '-'}</small>
                `;
                dataContainer.appendChild(card);
            });
        }

        function getColor(magnitude) {
            return magnitude > 6 ? '#ff0000' :
                   magnitude > 5 ? '#ff6600' :
                   magnitude > 4 ? '#ff9900' :
                   magnitude > 3 ? '#ffcc00' :
                   '#00cc00';
        }

        // Initial setup
        initMap();
        fetchEarthquakeData();
        setInterval(fetchEarthquakeData, 300000); // Update setiap 5 menit

        // Deteksi tema sistem
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            const newTheme = e.matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            updateMapTiles(newTheme);
        });
    </script>
</body>
</html>
